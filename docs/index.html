<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearCare — Medicaid Application Assistant</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#162e51;}
  body{
    font-family:'Public Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;
  }
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:52px;}
  .logo-mark{width:48px;height:48px;background:#00bde3;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .logo-mark svg{width:28px;height:28px;fill:#162e51;}
  .logo-name{font-size:1.75rem;font-weight:800;color:#ffffff;letter-spacing:-0.03em;}
  .logo-name span{color:#00bde3;}
  .logo-sub{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);margin-top:3px;}
  .track{width:300px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;margin-bottom:18px;}
  .bar{height:100%;width:0%;background:#00bde3;border-radius:2px;animation:load 2.6s cubic-bezier(0.4,0,0.2,1) forwards;}
  @keyframes load{0%{width:0%;}25%{width:40%;}55%{width:68%;}80%{width:85%;}100%{width:100%;}}
  .msg{font-size:0.85rem;color:rgba(255,255,255,0.45);letter-spacing:0.01em;}
</style>
</head>
<body>
<div class="logo">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
  </div>
  <div>
    <div class="logo-name">Clear<span>Care</span></div>
    <div class="logo-sub">Medicaid Application Assistant</div>
  </div>
</div>
<div class="track"><div class="bar"></div></div>
<div class="msg">Loading your application…</div>
<script>
  var APP_URL = 'https://apply.gatehousestrategic.com';
  setTimeout(function(){
    fetch(APP_URL,{mode:'no-cors'}).finally(function(){ window.location.href = APP_URL; });
  }, 2800);
  setTimeout(function(){ window.location.href = APP_URL; }, 6000);
</script>
</body>
</html>
